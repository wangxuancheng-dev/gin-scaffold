basePath: /
definitions:
  adminreq.UserCreateRequest:
    properties:
      nickname:
        maxLength: 64
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      role:
        enum:
        - admin
        - user
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  adminreq.UserUpdateRequest:
    properties:
      nickname:
        maxLength: 64
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      role:
        enum:
        - admin
        - user
        type: string
    type: object
  clientreq.FileCompleteRequest:
    properties:
      expected_sha256:
        description: 可选：64 位十六进制；S3 优先比对元数据，否则在大小上限内流式计算
        type: string
      expected_size:
        description: 可选：与对象 Content-Length 一致
        type: integer
      key:
        type: string
    required:
    - key
    type: object
  clientreq.FilePresignPutRequest:
    properties:
      content_length:
        description: 可选：与 PUT 的 Content-Length 一致（需 <= max_upload_mb）
        type: integer
      content_type:
        type: string
      filename:
        type: string
      sha256:
        description: 可选：64 位十六进制，写入 x-amz-meta-sha256 便于 /files/complete 校验
        type: string
    required:
    - content_type
    - filename
    type: object
  clientreq.LoginRequest:
    properties:
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  clientreq.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  clientreq.UserRegisterRequest:
    properties:
      nickname:
        maxLength: 64
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
      request_id:
        type: string
      trace_id:
        type: string
    type: object
info:
  contact: {}
  description: 企业级 Gin 脚手架示例 API
  title: Gin Scaffold API
  version: "1.0"
paths:
  /api/v1/admin/audit-logs:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 分页大小（<=200）
        in: query
        name: page_size
        type: integer
      - description: 用户 ID
        in: query
        name: user_id
        type: integer
      - description: 动作：POST|PUT|PATCH|DELETE
        in: query
        name: action
        type: string
      - description: HTTP 状态码
        in: query
        name: status
        type: integer
      - description: 按路径模糊匹配
        in: query
        name: path
        type: string
      - description: 按请求 ID 精确匹配
        in: query
        name: request_id
        type: string
      - description: 开始时间（RFC3339）
        in: query
        name: from
        type: string
      - description: 结束时间（RFC3339）
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 审计日志查询（后台）
      tags:
      - admin-ops
  /api/v1/admin/audit-logs/export:
    get:
      parameters:
      - description: 用户 ID
        in: query
        name: user_id
        type: integer
      - description: 动作：POST|PUT|PATCH|DELETE
        in: query
        name: action
        type: string
      - description: HTTP 状态码
        in: query
        name: status
        type: integer
      - description: 按路径模糊匹配
        in: query
        name: path
        type: string
      - description: 按请求 ID 精确匹配
        in: query
        name: request_id
        type: string
      - description: 开始时间（RFC3339）；为空时默认 now-7d
        in: query
        name: from
        type: string
      - description: 结束时间（RFC3339）；为空时默认 now
        in: query
        name: to
        type: string
      - description: 最大导出条数（默认 5000，最大 10000）
        in: query
        name: limit
        type: integer
      produces:
      - text/csv
      responses:
        "200":
          description: csv content
          schema:
            type: string
      summary: 审计日志导出（后台）
      tags:
      - admin-ops
  /api/v1/admin/dbping:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 数据库连通性检查（后台）
      tags:
      - admin-ops
  /api/v1/admin/menus:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 菜单列表（后台）
      tags:
      - admin-menu
  /api/v1/admin/users:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户列表（后台）
      tags:
      - admin-user
    post:
      consumes:
      - application/json
      parameters:
      - description: 创建参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminreq.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 创建用户（后台）
      tags:
      - admin-user
  /api/v1/admin/users/{id}:
    delete:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 删除用户（后台）
      tags:
      - admin-user
    get:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户详情（后台）
      tags:
      - admin-user
    put:
      consumes:
      - application/json
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/adminreq.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 更新用户（后台）
      tags:
      - admin-user
  /api/v1/admin/users/export:
    get:
      parameters:
      - description: 用户名（模糊）
        in: query
        name: username
        type: string
      - description: 昵称（模糊）
        in: query
        name: nickname
        type: string
      - description: '导出范围: all/page, 默认 all'
        in: query
        name: export_scope
        type: string
      - description: '导出格式: csv/xlsx, 默认 csv'
        in: query
        name: export_format
        type: string
      - description: 全量导出上限，默认 5000
        in: query
        name: export_limit
        type: integer
      - description: 流式导出批大小，默认 1000，最大 5000
        in: query
        name: export_batch_size
        type: integer
      - description: '导出列，逗号分隔: id,username,nickname,created_at,role'
        in: query
        name: fields
        type: string
      produces:
      - text/csv
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: csv/xlsx file
          schema:
            type: file
      summary: 用户导出（后台）
      tags:
      - admin-user
  /api/v1/client/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 登录
      tags:
      - client-user
  /api/v1/client/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 登出
      tags:
      - client-user
  /api/v1/client/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: 刷新参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 刷新令牌
      tags:
      - client-user
  /api/v1/client/files/complete:
    post:
      consumes:
      - application/json
      parameters:
      - description: 完成确认参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.FileCompleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 确认上传完成
      tags:
      - client-file
  /api/v1/client/files/download:
    get:
      parameters:
      - description: 文件 key
        in: query
        name: key
        required: true
        type: string
      - description: 过期时间（Unix 秒）
        in: query
        name: e
        required: true
        type: integer
      - description: 签名
        in: query
        name: sig
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: 下载文件（签名）
      tags:
      - client-file
  /api/v1/client/files/presign:
    post:
      consumes:
      - application/json
      parameters:
      - description: 预签名参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.FilePresignPutRequest'
      - description: 预签名有效期（秒），默认使用 storage.url_expire_sec
        in: query
        name: expire_sec
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 预签名直传 PUT
      tags:
      - client-file
  /api/v1/client/files/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 上传文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 上传文件
      tags:
      - client-file
  /api/v1/client/files/url:
    get:
      parameters:
      - description: 文件 key
        in: query
        name: key
        required: true
        type: string
      - description: 过期秒数，默认使用 storage.url_expire_sec
        in: query
        name: expire_sec
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 生成签名下载地址
      tags:
      - client-file
  /api/v1/client/ping:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: Ping
      tags:
      - base
  /api/v1/client/users:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.UserRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户注册
      tags:
      - client-user
  /api/v1/client/users/{id}:
    get:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户详情
      tags:
      - client-user
  /api/v1/sse/stream:
    get:
      responses: {}
      summary: SSE 演示
      tags:
      - realtime
  /api/v1/ws:
    get:
      parameters:
      - description: 用户ID
        in: query
        name: uid
        required: true
        type: integer
      responses: {}
      summary: WebSocket 演示
      tags:
      - realtime
  /health:
    get:
      description: 等价于 /readyz
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查（兼容）
      tags:
      - base
  /livez:
    get:
      description: 仅检测应用进程自身是否存活
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 存活检查
      tags:
      - base
  /readyz:
    get:
      description: 返回依赖组件就绪状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 就绪检查
      tags:
      - base
swagger: "2.0"
