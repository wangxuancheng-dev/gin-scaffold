basePath: /
definitions:
  clientreq.LoginRequest:
    properties:
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  clientreq.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  clientreq.UserRegisterRequest:
    properties:
      nickname:
        maxLength: 64
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
info:
  contact: {}
  description: 企业级 Gin 脚手架示例 API
  title: Gin Scaffold API
  version: "1.0"
paths:
  /api/v1/admin/dbping:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 数据库连通性检查（后台）
      tags:
      - admin-ops
  /api/v1/admin/menus:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 菜单列表（后台）
      tags:
      - admin-menu
  /api/v1/admin/users:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户列表（后台）
      tags:
      - admin-user
  /api/v1/client/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 登录
      tags:
      - client-user
  /api/v1/client/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 登出
      tags:
      - client-user
  /api/v1/client/auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: 刷新参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 刷新令牌
      tags:
      - client-user
  /api/v1/client/ping:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: Ping
      tags:
      - base
  /api/v1/client/users:
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/clientreq.UserRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户注册
      tags:
      - client-user
  /api/v1/client/users/{id}:
    get:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户详情
      tags:
      - client-user
  /api/v1/sse/stream:
    get:
      responses: {}
      summary: SSE 演示
      tags:
      - realtime
  /api/v1/ws:
    get:
      parameters:
      - description: 用户ID
        in: query
        name: uid
        required: true
        type: integer
      responses: {}
      summary: WebSocket 演示
      tags:
      - realtime
  /health:
    get:
      description: 等价于 /readyz
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查（兼容）
      tags:
      - base
  /livez:
    get:
      description: 仅检测应用进程自身是否存活
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 存活检查
      tags:
      - base
  /readyz:
    get:
      description: 返回依赖组件就绪状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 就绪检查
      tags:
      - base
swagger: "2.0"
