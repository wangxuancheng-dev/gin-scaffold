basePath: /
definitions:
  request.LoginRequest:
    properties:
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  request.UserRegisterRequest:
    properties:
      nickname:
        maxLength: 64
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
info:
  contact: {}
  description: 企业级 Gin 脚手架示例 API
  title: Gin Scaffold API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: page_size
        type: integer
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.LoginRequest'
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 登录
      tags:
      - user
      - user
  /api/v1/ping:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: Ping
      tags:
      - base
  /api/v1/sse/stream:
    get:
      responses: {}
      summary: SSE 演示
      tags:
      - realtime
  /api/v1/users:
    get:
      consumes:
      - application/json
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: page_size
        type: integer
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.LoginRequest'
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 登录
      tags:
      - user
      - user
    post:
      consumes:
      - application/json
      parameters:
      - description: 注册参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.UserRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户注册
      tags:
      - user
  /api/v1/users/{id}:
    get:
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户详情
      tags:
      - user
  /api/v1/ws:
    get:
      parameters:
      - description: 用户ID
        in: query
        name: uid
        required: true
        type: integer
      responses: {}
      summary: WebSocket 演示
      tags:
      - realtime
  /health:
    get:
      description: 返回各依赖状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查
      tags:
      - base
swagger: "2.0"
