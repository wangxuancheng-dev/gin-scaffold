env: prod
name: gin-scaffold
debug: false

http:
  host: "0.0.0.0"
  port: 8080
  read_timeout_sec: 30
  read_header_timeout_sec: 10
  write_timeout_sec: 30
  idle_timeout_sec: 120
  shutdown_timeout_sec: 20
  max_body_bytes: 1048576

log:
  level: info
  dir: /var/log/app
  app_file: app.log
  access_file: access.log
  error_file: error.log
  rotation_mode: size
  app_rotation_mode: ""
  access_rotation_mode: ""
  error_rotation_mode: ""
  max_size_mb: 200
  max_backups: 30
  max_age_days: 30
  compress: true
  console: false

db:
  driver: mysql
  dsn: "${DB_DSN}"
  time_zone: "UTC"
  replicas: []
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime_sec: 600
  conn_max_idle_time_sec: 120
  slow_threshold_ms: 300
  log_level: warn

redis:
  addr: "${REDIS_ADDR}"
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 50
  min_idle_conns: 10
  dial_timeout_sec: 5
  read_timeout_sec: 3
  write_timeout_sec: 3

asynq:
  redis_addr: "${REDIS_ADDR}"
  redis_password: "${REDIS_PASSWORD}"
  redis_db: 1
  concurrency: 20
  strict_priority: false
  queue: "default"
  queues:
    critical: 8
    default: 3
    low: 1
  max_retry: 8
  timeout_sec: 60
  dedup_window_sec: 30

jwt:
  secret: "${JWT_SECRET}"
  access_expire_min: 60
  refresh_expire_min: 4320
  issuer: "gin-scaffold"

metrics:
  enabled: true
  path: /metrics

trace:
  enabled: true
  endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
  service_name: "gin-scaffold"
  insecure: false

i18n:
  default_lang: zh
  bundle_paths:
    - ./i18n/zh.json
    - ./i18n/en.json

limiter:
  ip_rps: 30
  ip_burst: 60
  route_rps: 100
  route_burst: 200

snowflake:
  node: 1

cors:
  allow_origins:
    - "https://example.com"
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - Authorization
    - Content-Type
    - Accept-Language
    - X-Request-ID
  expose_headers:
    - Content-Length
    - X-Request-ID
  allow_credentials: true

rbac:
  super_admin_user_id: 1

scheduler:
  enabled: false
  with_seconds: false
  log_retention_days: 30
  lock_enabled: true
  lock_ttl_seconds: 300
  lock_prefix: "scheduler:task:lock:"

outbound:
  timeout_ms: 2500
  retry_max: 2
  retry_backoff_ms: 200
  circuit_threshold: 10
  circuit_open_sec: 30

storage:
  enabled: true
  driver: local
  local_dir: "/opt/gin-scaffold/storage"
  sign_secret: "${STORAGE_SIGN_SECRET}"
  max_upload_mb: 20
  allowed_ext: ".jpg,.jpeg,.png,.pdf,.doc,.docx,.xlsx,.txt"
  allowed_mime: "image/jpeg,image/png,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/plain"
  url_expire_sec: 300
  readyz_check: false

platform:
  audit:
    enabled: false
  idempotency:
    enabled: false
    ttl_seconds: 86400
    lock_seconds: 120
    max_body_bytes: 262144
    max_cached_response_bytes: 524288
  cache:
    key_prefix: "gin-scaffold:"
  notify:
    driver: log
