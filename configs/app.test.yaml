env: test
name: gin-scaffold-test
debug: true

http:
  host: "127.0.0.1"
  port: 18080
  read_timeout_sec: 15
  read_header_timeout_sec: 5
  write_timeout_sec: 15
  idle_timeout_sec: 60
  shutdown_timeout_sec: 10
  max_body_bytes: 1048576

log:
  level: info
  dir: ./logs
  app_file: app.log
  access_file: access.log
  error_file: error.log
  rotation_mode: size
  app_rotation_mode: ""
  access_rotation_mode: ""
  error_rotation_mode: ""
  max_size_mb: 50
  max_backups: 5
  max_age_days: 7
  compress: true
  console: true

db:
  driver: mysql
  dsn: "root:root@tcp(127.0.0.1:3306)/scaffold_test?charset=utf8mb4&parseTime=True"
  time_zone: "UTC"
  replicas: []
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime_sec: 300
  conn_max_idle_time_sec: 60
  slow_threshold_ms: 200
  log_level: warn

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 2
  dial_timeout_sec: 3
  read_timeout_sec: 3
  write_timeout_sec: 3

asynq:
  redis_addr: "127.0.0.1:6379"
  redis_password: ""
  redis_db: 2
  concurrency: 5
  strict_priority: false
  queue: "default"
  queues:
    critical: 5
    default: 3
    low: 1
  max_retry: 5
  timeout_sec: 30
  dedup_window_sec: 15

jwt:
  secret: "test-secret"
  access_expire_min: 60
  refresh_expire_min: 4320
  issuer: "gin-scaffold-test"

metrics:
  enabled: true
  path: /metrics

trace:
  enabled: false
  endpoint: "http://127.0.0.1:4318/v1/traces"
  service_name: "gin-scaffold-test"
  insecure: true

i18n:
  default_lang: zh
  bundle_paths:
    - ./i18n/zh.json
    - ./i18n/en.json

limiter:
  ip_rps: 100
  ip_burst: 200
  route_rps: 500
  route_burst: 800

snowflake:
  node: 1

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - "*"
  expose_headers:
    - Content-Length
    - X-Request-ID
  allow_credentials: false

rbac:
  super_admin_user_id: 1

scheduler:
  enabled: false
  with_seconds: false
  log_retention_days: 7
  lock_enabled: true
  lock_ttl_seconds: 60
  lock_prefix: "scheduler:task:lock:"

outbound:
  timeout_ms: 1500
  retry_max: 1
  retry_backoff_ms: 100
  circuit_threshold: 5
  circuit_open_sec: 10

storage:
  enabled: true
  driver: local
  local_dir: ./storage-test
  sign_secret: "test-storage-sign-secret"
  max_upload_mb: 5
  allowed_ext: ".jpg,.png,.txt"
  allowed_mime: "image/jpeg,image/png,text/plain"
  url_expire_sec: 120
