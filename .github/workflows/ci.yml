name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Enforce handler error helper
        run: bash ./scripts/check-handler-error-helper.sh

      - name: Run unit tests
        run: go test ./tests/unit/...

      - name: Run code generator tests
        run: go test ./cmd/gen

      - name: Run all tests
        run: go test ./...

      - name: Race detector (requires CGO on Linux runner)
        run: go test -race ./...

      - name: Enforce coverage gate
        env:
          COVERAGE_THRESHOLD: '25'
        run: bash ./scripts/go-cover.sh

      - name: Verify swagger is up to date
        run: |
          set -e
          tmpdir=$(mktemp -d)
          go run github.com/swaggo/swag/cmd/swag@latest init -g main.go -o "$tmpdir" -d ./cmd/server,./api
          diff -q docs/swagger.json "$tmpdir/swagger.json"
          diff -q docs/docs.go "$tmpdir/docs.go"
          diff -q docs/swagger.yaml "$tmpdir/swagger.yaml"

      - name: Verify OpenAPI SDK artifacts are up to date
        run: |
          set -e
          bash ./scripts/gen-openapi-sdk.sh
          diff -q docs/swagger.json pkg/sdk/openapi/swagger.json
          sha=$(sha256sum docs/swagger.json | awk '{print $1}')
          test "$sha" = "$(cat pkg/sdk/openapi/swagger.sha256)"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: $(go env GOPATH)/bin/gosec ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Build server
        run: go build -o bin/server ./cmd/server

  integration:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Integration tests (MySQL + Redis + API + worker)
        run: bash ./scripts/integration.sh


