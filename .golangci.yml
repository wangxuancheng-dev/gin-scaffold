run:
  timeout: 5m
  # golangci-lint release binaries may trail the module `go` directive; keep analysis on a supported toolchain.
  go: '1.23'

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - bodyclose
    - misspell
    - durationcheck
    - asciicheck

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
